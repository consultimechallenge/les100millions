<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Consultime 100M</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1E2D5E;--navy2:#111c3d;--orange:#E85415;--orange2:#ff6b35;--gold:#C8922A;--gold2:#F5C842;--white:#fff;--gray:#8a8a9a;--ok:#2ecc71;--ko:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--navy2);color:var(--white);min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 20% 50%,rgba(200,146,42,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(30,45,94,.5) 0%,transparent 50%),var(--navy2);}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
.logo{width:200px;height:auto;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(200,146,42,.5));animation:glow 3s ease-in-out infinite alternate;}
@keyframes glow{from{filter:drop-shadow(0 0 15px rgba(200,146,42,.4));}to{filter:drop-shadow(0 0 35px rgba(200,146,42,.9));}}
.header{text-align:center;padding:24px 20px 16px;width:100%;max-width:760px;}
.header h1{font-family:"Playfair Display",serif;font-size:clamp(1.2rem,3.5vw,1.8rem);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.header p{color:var(--gold2);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;margin-top:5px;opacity:.85;}
.prog-wrap{width:100%;max-width:680px;margin:12px auto 6px;display:flex;align-items:center;gap:10px;}
.prog-bar{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:3px;transition:width .5s ease;}
.prog-lbl{font-size:.78rem;color:var(--gold2);font-weight:600;white-space:nowrap;}
.stats{display:flex;gap:12px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;}
.chip{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:7px 18px;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:7px;}
.chip .lbl{color:var(--gray);font-weight:400;}
.chip .val{color:var(--gold2);}
.chip.t .val{color:var(--white);}
.chip.t.urgent .val{color:var(--ko);animation:pulse .6s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.card{width:100%;max-width:680px;background:linear-gradient(145deg,rgba(30,45,94,.7),rgba(17,28,61,.92));border:1px solid rgba(200,146,42,.25);border-radius:20px;padding:32px 36px;backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:cardIn .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.qnum{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.qnum::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(200,146,42,.4),transparent);}
.qtext{font-family:"Playfair Display",serif;font-size:clamp(.95rem,2.3vw,1.22rem);line-height:1.5;margin-bottom:26px;font-weight:700;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:13px 18px;color:var(--white);font-family:"DM Sans",sans-serif;font-size:.92rem;text-align:left;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:11px;}
.opt .ol{width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--gold2);flex-shrink:0;transition:all .2s;}
.opt:hover:not(:disabled){background:rgba(200,146,42,.12);border-color:rgba(200,146,42,.4);transform:translateX(4px);}
.opt:hover:not(:disabled) .ol{background:var(--gold);color:var(--navy2);border-color:var(--gold);}
.opt.correct{background:rgba(46,204,113,.15);border-color:var(--ok);}
.opt.correct .ol{background:var(--ok);color:#fff;border-color:var(--ok);}
.opt.wrong{background:rgba(231,76,60,.12);border-color:var(--ko);opacity:.65;}
.opt.wrong .ol{background:var(--ko);color:#fff;border-color:var(--ko);}
.opt:disabled{cursor:default;}
.opt.vf{justify-content:center;font-size:1.1rem;font-weight:700;letter-spacing:.05em;}
.fb{margin-top:18px;padding:12px 16px;border-radius:11px;font-size:.88rem;line-height:1.5;display:none;animation:fi .3s ease;}
.fb.ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:#7dffb3;display:block;}
.fb.ko{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#ff9f9f;display:block;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.nxt{margin-top:20px;width:100%;padding:14px;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;border-radius:11px;color:#fff;font-family:"DM Sans",sans-serif;font-size:.98rem;font-weight:600;cursor:pointer;display:none;transition:all .2s;letter-spacing:.04em;box-shadow:0 4px 20px rgba(232,84,21,.4);}
.nxt:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(232,84,21,.5);}
.nxt.v{display:block;animation:fi .3s ease;}
/* INTRO */
.intro{width:100%;max-width:680px;background:linear-gradient(145deg,rgba(30,45,94,.8),rgba(17,28,61,.95));border:1px solid rgba(200,146,42,.3);border-radius:22px;padding:44px 36px;text-align:center;box-shadow:0 28px 70px rgba(0,0,0,.5);animation:cardIn .5s cubic-bezier(.175,.885,.32,1.275);}
.intro h2{font-family:"Playfair Display",serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:900;margin-bottom:14px;}
.intro p{color:rgba(255,255,255,.72);line-height:1.7;margin-bottom:10px;font-size:.92rem;}
.name-input{width:100%;padding:14px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(200,146,42,.3);border-radius:11px;color:#fff;font-family:"DM Sans",sans-serif;font-size:1rem;margin:16px 0;outline:none;transition:border-color .2s;}
.name-input::placeholder{color:var(--gray);}
.name-input:focus{border-color:var(--gold2);}
.rules{background:rgba(200,146,42,.08);border:1px solid rgba(200,146,42,.2);border-radius:13px;padding:18px 22px;text-align:left;margin:16px 0 24px;}
.rules li{list-style:none;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.87rem;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:9px;}
.rules li:last-child{border-bottom:none;}
.rules li::before{content:"\2726";color:var(--gold);font-size:.68rem;flex-shrink:0;}
.sbtn{padding:15px 44px;background:linear-gradient(135deg,var(--orange),var(--orange2));border:none;border-radius:13px;color:#fff;font-family:"DM Sans",sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.04em;box-shadow:0 6px 28px rgba(232,84,21,.5);text-transform:uppercase;}
.sbtn:hover{transform:translateY(-3px);box-shadow:0 12px 38px rgba(232,84,21,.6);}
.sbtn:disabled{opacity:.4;cursor:default;transform:none;}
/* RESULTS */
.res{width:100%;max-width:680px;text-align:center;animation:cardIn .5s cubic-bezier(.175,.885,.32,1.275);}
.res-card{background:linear-gradient(145deg,rgba(30,45,94,.8),rgba(17,28,61,.96));border:1px solid rgba(200,146,42,.3);border-radius:22px;padding:44px 36px;box-shadow:0 28px 70px rgba(0,0,0,.6);}
.trophy{font-size:3.8rem;margin-bottom:10px;animation:bounce 1s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-8px);}}
.res h2{font-family:"Playfair Display",serif;font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;margin-bottom:6px;}
.score-big{font-family:"Playfair Display",serif;font-size:clamp(2.8rem,9vw,5rem);font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin:14px 0;}
.score-sub{color:var(--gray);font-size:.9rem;margin-bottom:26px;}
.pod{font-size:1.05rem;font-weight:600;color:var(--gold2);background:rgba(200,146,42,.1);border:1px solid rgba(200,146,42,.25);border-radius:11px;padding:14px 22px;margin-bottom:26px;line-height:1.5;}
.breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:26px;}
.bc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:13px 9px;font-size:.82rem;}
.bc .bv{font-size:1.5rem;font-weight:700;font-family:"Playfair Display",serif;display:block;margin-bottom:3px;}
.bc.g .bv{color:var(--ok);}
.bc.b .bv{color:var(--ko);}
.bc.t .bv{color:var(--gold2);}
.bc .bl{color:var(--gray);font-size:.72rem;}
.dl-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:13px;color:var(--navy2);font-family:"DM Sans",sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.04em;box-shadow:0 6px 28px rgba(200,146,42,.4);margin-top:8px;}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(200,146,42,.6);}
/* CERTIFICATE CANVAS hidden */
#certCanvas{display:none;}
/* CONFETTI */
.cf{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;}
.cp{position:absolute;top:-20px;width:7px;height:13px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@media(max-width:520px){.card,.intro,.res-card{padding:22px 16px;}.breakdown{grid-template-columns:1fr 1fr;}.logo{width:150px;}}
</style>
</head>

var TOTAL=QS.length,TIMER=20,cur=0,score=0,wrong=0,answered=false,timerID=null,timeLeft=TIMER,totalTime=0;
var playerName="";
var bonusPhase=0; // 0=not started, 1=vrai/faux shown, 2=who shown
var bonusScore=0;

function fmt(s){return s<10?"0"+s:String(s);}
function el(id){return document.getElementById(id);}

function showIntro(){
  var h="";
  h+='<div class="intro">';
  h+='<h2>Pret(e) pour le quiz !</h2>';
  h+='<p>Entrez votre prenom pour commencer. Votre score sera inscrit sur votre certificat a la fin !</p>';
  h+='<input class="name-input" id="nameInput" type="text" placeholder="Votre prenom..." maxlength="30" oninput="checkName()">';
  h+='<ul class="rules">';
  h+='<li>'+TOTAL+' questions + 1 question bonus sur l&#8217;histoire de Consultime</li>';
  h+='<li>'+TIMER+' secondes par question - le chrono tourne !</li>';
  h+='<li>Impossible de rejouer une fois commence</li>';
  h+='<li>Le gagnant remporte une box cadeau !</li>';
  h+='</ul>';
  h+='<button class="sbtn" id="startBtn" onclick="startQuiz()" disabled>Lancer le quiz !</button>';
  h+='</div>';
  el("screen").innerHTML=h;
}

function checkName(){
  var v=el("nameInput").value.trim();
  el("startBtn").disabled=(v.length<2);
}

function startQuiz(){
  playerName=el("nameInput").value.trim();
  cur=0;score=0;wrong=0;totalTime=0;
  showQuestion();
}

function showQuestion(){
  answered=false;clearInterval(timerID);timeLeft=TIMER;
  var q=QS[cur];
  var pct=Math.round((cur/TOTAL)*100);
  var L=["A","B","C","D"];
  var oh="";
  for(var i=0;i<q.opts.length;i++){
    oh+='<button class="opt" id="opt'+i+'" onclick="pick('+i+')">'
       +'<span class="ol">'+L[i]+'</span>'+q.opts[i]+'</button>';
  }
  var isLast=(cur+1>=TOTAL);
  var h="";
  h+='<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
  h+='<span class="prog-lbl">'+(cur+1)+' / '+TOTAL+'</span></div>';
  h+='<div class="stats">';
  h+='<div class="chip"><span class="lbl">Score</span><span class="val" id="sc">'+score+'</span></div>';
  h+='<div class="chip t" id="tc"><span class="lbl">&#9201;</span><span class="val" id="tv">'+fmt(timeLeft)+'</span></div>';
  h+='</div>';
  h+='<div class="card">';
  h+='<div class="qnum">Question '+(cur+1)+' sur '+TOTAL+'</div>';
  h+='<div class="qtext">'+q.q+'</div>';
  h+='<div class="opts">'+oh+'</div>';
  h+='<div class="fb" id="fb"></div>';
  h+=isLast
    ?'<button class="nxt" id="nxt" onclick="goBonus()">Question bonus &#9654;</button>'
    :'<button class="nxt" id="nxt" onclick="next()">Question suivante &#8594;</button>';
  h+='</div>';
  el("screen").innerHTML=h;
  timerID=setInterval(function(){
    timeLeft--;totalTime++;
    var tv=el("tv"),tc=el("tc");
    if(tv)tv.textContent=fmt(timeLeft);
    if(timeLeft<=5&&tc)tc.classList.add("urgent");
    if(timeLeft<=0){clearInterval(timerID);if(!answered)timeout();}
  },1000);
}

function timeout(){
  answered=true;wrong++;disableOpts();
  var c=QS[cur].a;
  el("opt"+c).classList.add("correct");
  var fb=el("fb");fb.className="fb ko";
  fb.textContent="Temps ecoule ! Bonne reponse : "+QS[cur].opts[c];
  el("nxt").classList.add("v");
}

function pick(i){
  if(answered)return;
  answered=true;clearInterval(timerID);totalTime+=(TIMER-timeLeft);
  disableOpts();
  var c=QS[cur].a;
  var fb=el("fb");
  if(i===c){
    score++;el("opt"+i).classList.add("correct");
    el("sc").textContent=score;
    fb.className="fb ok";fb.textContent="Bonne reponse !";
  }else{
    wrong++;el("opt"+i).classList.add("wrong");
    el("opt"+c).classList.add("correct");
    fb.className="fb ko";fb.textContent="Rate ! Bonne reponse : "+QS[cur].opts[c];
  }
  el("nxt").classList.add("v");
}

function disableOpts(){for(var i=0;i<4;i++){var b=el("opt"+i);if(b)b.disabled=true;}}
function next(){cur++;if(cur>=TOTAL)goBonus();else showQuestion();}

// ===== BONUS QUESTION =====
function goBonus(){
  bonusPhase=1;bonusScore=0;
  clearInterval(timerID);
  var h="";
  h+='<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:100%"></div></div>';
  h+='<span class="prog-lbl">Bonus !</span></div>';
  h+='<div class="stats"><div class="chip"><span class="lbl">Score</span><span class="val">'+score+'</span></div></div>';
  h+='<div class="card">';
  h+='<div class="qnum">Question BONUS</div>';
  h+='<div class="qtext">Un(e) ancien(ne) de Consultime a participe a un film de charme apres son depart de la societe. Vrai ou Faux ?</div>';
  h+='<div class="opts">';
  h+='<button class="opt vf" id="optV" onclick="bonusVF(true)"><span class="ol">V</span>VRAI</button>';
  h+='<button class="opt vf" id="optF" onclick="bonusVF(false)"><span class="ol">F</span>FAUX</button>';
  h+='</div>';
  h+='<div class="fb" id="fb"></div>';
  h+='<button class="nxt" id="nxt" onclick="bonusWho()">Qui est-ce ? &#8594;</button>';
  h+='</div>';
  el("screen").innerHTML=h;
}

function bonusVF(isTrue){
  el("optV").disabled=true;el("optF").disabled=true;
  var fb=el("fb");
  if(isTrue){
    bonusScore++;
    el("optV").classList.add("correct");
    fb.className="fb ok";fb.textContent="Bonne reponse ! Et maintenant, qui est cette personne ?";
    el("nxt").classList.add("v");
  }else{
    el("optF").classList.add("wrong");el("optV").classList.add("correct");
    fb.className="fb ko";fb.textContent="Rate ! C’est bien VRAI !";
    el("nxt").classList.add("v");
  }
}

function bonusWho(){
  bonusPhase=2;
  var h="";
  h+='<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:100%"></div></div>';
  h+='<span class="prog-lbl">Bonus !</span></div>';
  h+='<div class="stats"><div class="chip"><span class="lbl">Score</span><span class="val">'+score+'</span></div></div>';
  h+='<div class="card">';
  h+='<div class="qnum">Question BONUS - Partie 2</div>';
  h+='<div class="qtext">De qui s’agit-il ?</div>';
  h+='<div class="opts">';
  var names=["Sabra Amada","Benjamin Alcon Castel","Yoann Tall","Melissa Jordan"];
  var L=["A","B","C","D"];
  for(var i=0;i<names.length;i++){
    h+='<button class="opt" id="optB'+i+'" onclick="bonusPick('+i+')">';
    h+='<span class="ol">'+L[i]+'</span>'+names[i]+'</button>';
  }
  h+='<div class="fb" id="fb"></div>';
  h+='<button class="nxt" id="nxt" onclick="showResults()">Voir les resultats !</button>';
  h+='</div>';
  el("screen").innerHTML=h;
}

function bonusPick(i){
  for(var j=0;j<4;j++){var b=el("optB"+j);if(b)b.disabled=true;}
  var fb=el("fb");
  if(i===0){
    bonusScore++;
    el("optB0").classList.add("correct");
    fb.className="fb ok";fb.textContent="Bonne reponse ! C’etait bien Sabra Amada !";
  }else{
    el("optB"+i).classList.add("wrong");el("optB0").classList.add("correct");
    fb.className="fb ko";fb.textContent="Rate ! C’etait Sabra Amada !";
  }
  el("nxt").classList.add("v");
}

function podMsg(pct){
  if(pct>=90)return "Legende absolue ! Vous connaissez Consultime mieux que vous-meme.";
  if(pct>=75)return "Excellent ! Vous faites partie des piliers de la maison.";
  if(pct>=60)return "Tres bon resultat ! Quelques anecdotes vous ont echappe.";
  if(pct>=40)return "Pas mal, mais il reste du chemin pour devenir un vrai Consultimien !";
  return "On dirait que vous venez juste d’arriver... Travaillez les fondamentaux !";
}

function showResults(){
  clearInterval(timerID);
  var finalScore=score+bonusScore;
  var maxScore=TOTAL+2;
  var pct=Math.round((finalScore/maxScore)*100);
  var mins=Math.floor(totalTime/60),secs=totalTime%60;
  var h="";
  h+='<div class="res"><div class="res-card">';
  h+='<div class="trophy">&#127942;</div>';
  h+='<h2>Bravo '+playerName+' !</h2>';
  h+='<div class="score-big">'+finalScore+'/'+maxScore+'</div>';
  h+='<div class="score-sub">'+pct+'% de bonnes reponses</div>';
  h+='<div class="pod">'+podMsg(pct)+'</div>';
  h+='<div class="breakdown">';
  h+='<div class="bc g"><span class="bv">'+finalScore+'</span><span class="bl">Bonnes reponses</span></div>';
  h+='<div class="bc b"><span class="bv">'+(maxScore-finalScore)+'</span><span class="bl">Mauvaises reponses</span></div>';
  h+='<div class="bc t"><span class="bv">'+mins+':'+fmt(secs)+'</span><span class="bl">Temps total</span></div>';
  h+='</div>';
  h+='<button class="dl-btn" onclick="downloadCert()">&#127881; Telecharger mon certificat</button>';
  h+='<p style="color:rgba(255,255,255,.4);font-size:.78rem;margin-top:16px;">Le quiz ne peut pas etre rejoue.</p>';
  h+='</div></div>';
  el("screen").innerHTML=h;
  if(pct>=60)launchConfetti();
  prepareCert(playerName, finalScore, maxScore, pct);
}

function drawCert(ctx,name,sc,max,pct,logoImg){
  var W=900,H=640;
  ctx.clearRect(0,0,W,H);
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0d1630");bg.addColorStop(1,"#1E2D5E");
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="#C8922A";ctx.lineWidth=6;ctx.strokeRect(18,18,W-36,H-36);
  ctx.strokeStyle="rgba(200,146,42,0.4)";ctx.lineWidth=2;ctx.strokeRect(32,32,W-64,H-64);
  [[46,46],[W-46,46],[46,H-46],[W-46,H-46]].forEach(function(c){
    ctx.fillStyle="#C8922A";ctx.beginPath();ctx.arc(c[0],c[1],5,0,Math.PI*2);ctx.fill();
  });
  if(logoImg&&logoImg.complete&&logoImg.naturalWidth>0){
    ctx.drawImage(logoImg,W/2-55,52,110,110);
  }else{
    ctx.textAlign="center";ctx.fillStyle="#F5C842";ctx.font="bold 26px serif";
    ctx.fillText("CONSULTIME 100M€",W/2,120);
  }
  ctx.textAlign="center";
  ctx.strokeStyle="rgba(200,146,42,0.4)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-200,178);ctx.lineTo(W/2+200,178);ctx.stroke();
  ctx.fillStyle="#F5C842";ctx.font="bold 13px sans-serif";
  ctx.fillText("CERTIFICAT  DE  PARTICIPATION",W/2,204);
  ctx.beginPath();ctx.moveTo(W/2-200,218);ctx.lineTo(W/2+200,218);ctx.stroke();
  ctx.fillStyle="#FFFFFF";ctx.font="bold 54px Georgia,serif";
  ctx.fillText(name,W/2,290);
  ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="15px sans-serif";
  ctx.fillText("a participe au Grand Quiz des 100M€ de Consultime",W/2,323);
  var cx=W/2,cy=418,r=72;
  var grad=ctx.createRadialGradient(cx,cy,5,cx,cy,r);
  grad.addColorStop(0,"rgba(200,146,42,0.3)");grad.addColorStop(1,"rgba(200,146,42,0)");
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#C8922A";ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle="#F5C842";ctx.font="bold 46px Georgia,serif";
  ctx.fillText(sc+"/"+max,W/2,432);
  ctx.fillStyle="rgba(255,255,255,0.55)";ctx.font="13px sans-serif";
  ctx.fillText(pct+"% de bonnes reponses",W/2,456);
  ctx.font="34px serif";
  var medal=pct>=90?String.fromCodePoint(0x1F3C6):pct>=75?String.fromCodePoint(0x1F947):pct>=60?String.fromCodePoint(0x1F948):String.fromCodePoint(0x1F949);
  ctx.fillText(medal,W/2,506);
  ctx.strokeStyle="rgba(200,146,42,0.3)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-200,526);ctx.lineTo(W/2+200,526);ctx.stroke();
  var d=new Date();
  ctx.fillStyle="rgba(255,255,255,0.35)";ctx.font="11px sans-serif";
  ctx.fillText("Consultime by Freeland  -  "+d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear(),W/2,546);
}
function prepareCert(name,sc,max,pct){
  window._certData={name:name,sc:sc,max:max,pct:pct};
}
function downloadCert(){
  var data=window._certData;if(!data)return;
  var canvas=el("certCanvas");
  canvas.width=900;canvas.height=640;
  var ctx=canvas.getContext("2d");
  var logoImg=el("logoImg");
  function render(){
    drawCert(ctx,data.name,data.sc,data.max,data.pct,logoImg);
    setTimeout(function(){
      var link=document.createElement("a");
      link.download="certificat-consultime-"+data.name+".png";
      link.href=canvas.toDataURL("image/png");
      document.body.appendChild(link);link.click();document.body.removeChild(link);
    },100);
  }
  if(logoImg&&logoImg.complete&&logoImg.naturalWidth>0){render();}
  else{logoImg.onload=render;var s=logoImg.src;logoImg.src="";logoImg.src=s;}
}

function launchConfetti(){
  var cf=el("cf");
  var cols=["#F5C842","#E85415","#C8922A","#ffffff","#ff6b35"];
  for(var i=0;i<80;i++){
    (function(idx){
      setTimeout(function(){
        var p=document.createElement("div");p.className="cp";
        p.style.left=Math.random()*100+"vw";
        p.style.background=cols[Math.floor(Math.random()*cols.length)];
        p.style.animationDuration=(1.5+Math.random()*2.5)+"s";
        p.style.animationDelay=Math.random()*.5+"s";
        p.style.width=(5+Math.random()*7)+"px";
        p.style.height=(10+Math.random()*10)+"px";
        cf.appendChild(p);
        setTimeout(function(){p.remove();},4000);
      },idx*40);
    })(i);
  }
}

showIntro();
